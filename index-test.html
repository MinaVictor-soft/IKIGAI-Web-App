<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IKIGAI Quest - Test</title>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.2.3",
        "react-dom/client": "https://esm.sh/react-dom@19.2.3/client"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    
    const App = () => React.createElement('div', {
      style: { padding: '40px', fontFamily: 'sans-serif', textAlign: 'center' }
    }, 
      React.createElement('h1', { style: { color: '#6366f1' } }, 'IKIGAI Quest Web App'),
      React.createElement('p', {}, 'Welcome to IKIGAI Quest!'),
      React.createElement('button', {
        style: { padding: '10px 20px', fontSize: '16px', backgroundColor: '#6366f1', color: 'white', border: 'none', borderRadius: '4px', cursor: 'pointer' }
      }, 'Get Started')
    );
    
    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
